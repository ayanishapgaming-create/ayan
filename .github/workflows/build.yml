name: Build & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Bootstrap the gradle-wrapper.jar if it's a stub (< 50 KB)
      - name: Bootstrap Gradle wrapper jar
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          MIN_SIZE=50000
          ACTUAL=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          if [ "$ACTUAL" -lt "$MIN_SIZE" ]; then
            echo "Stub detected ($ACTUAL bytes). Downloading real jar..."
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/v9.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR" || \
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v9.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
            echo "Downloaded: $(stat -c%s "$JAR") bytes"
          else
            echo "Wrapper jar OK ($ACTUAL bytes)"
          fi

      - name: Cache Gradle & Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: server-manager-plus-${{ github.sha }}
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Server Manager+ ${{ github.ref_name }}"
          body: |
            ## Server Manager+ ${{ github.ref_name }}

            > **Minecraft 1.21.11 · Fabric**  
            > by Azor Studio

            ### Requirements
            | Dependency | Version |
            |---|---|
            | Minecraft | 1.21.11 |
            | Fabric Loader | ≥ 0.18.1 |
            | Fabric API | 0.141.4+1.21.11 |

            ### Installation
            1. Install [Fabric Loader](https://fabricmc.net/use/installer/) for Minecraft **1.21.11**
            2. Download [Fabric API](https://modrinth.com/mod/fabric-api/versions?g=1.21.11)
            3. Place both `.jar` files in your `mods/` folder

            ### Features
            - 🔍 Search bar on server list and world select (by name or IP)
            - 📌 Pin servers and worlds — pinned entries always appear first
            - ★ Toggle to show only pinned entries
            - 🌍 Country flag emoji on each server entry
            - 🗨️ Hover the flag for the full country name tooltip
            - Right-click any server/world → Pin / Unpin context menu
          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
