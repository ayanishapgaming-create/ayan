name: Build & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java 21 — required for Minecraft 1.21.11
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Bootstrap Gradle wrapper jar if it's missing or a stub
      - name: Bootstrap Gradle wrapper
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          MIN_SIZE=50000
          if [ ! -f "$JAR" ] || [ $(stat -c%s "$JAR") -lt $MIN_SIZE ]; then
            echo "Downloading real gradle-wrapper.jar..."
            curl -sL "https://github.com/gradle/gradle/raw/v8.10.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
          else
            echo "gradle-wrapper.jar looks fine ($(stat -c%s "$JAR") bytes)"
          fi

      # 4. Cache Gradle downloads and Loom's mapped jars between runs
      - name: Cache Gradle & Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Make gradlew executable
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # 6. Build — Loom downloads MC + mappings, then compiles and remaps the jar
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # 7. Upload the mod jar as an artifact on every build (no tag needed)
      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: server-manager-plus-${{ github.sha }}
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error

      # 8. On version tags (v1.0.0, v1.2.3 …) → publish a GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Server Manager+ ${{ github.ref_name }}"
          body: |
            ## Server Manager+ ${{ github.ref_name }}

            > **Minecraft 1.21.11 · Fabric**
            > by Azor Studio

            ### Requirements
            | Dependency | Version |
            |---|---|
            | Minecraft | 1.21.11 |
            | Fabric Loader | ≥ 0.18.1 |
            | Fabric API | 0.141.4+1.21.11 |

            ### Installation
            1. Install [Fabric Loader](https://fabricmc.net/use/installer/) for Minecraft **1.21.11**
            2. Download [Fabric API 0.141.4+1.21.11](https://modrinth.com/mod/fabric-api)
            3. Place both `.jar` files in your `mods/` folder
            4. Launch Minecraft with the Fabric profile

            ### Features
            - 🔍 Search bar on the server list and world select screen (by name or IP)
            - 📌 Pin servers and worlds — pinned entries always appear at the top
            - ★ Toggle to show only pinned servers/worlds
            - 🌍 Country flag emoji on each server entry
            - 🗨️ Hover the flag to see the full country name tooltip
            - Right-click any server/world → Pin / Unpin context menu
          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
